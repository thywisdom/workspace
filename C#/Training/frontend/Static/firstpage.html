<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
<style>
body {
   font-family: Arial, sans-serif;
   display: flex; justify-content: center; align-items: center;
   height: 100vh; background-color: #f4f4f4;
}
main {
   background: #fff; padding: 20px; border-radius: 10px;
   box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px;
}
label { font-weight: bold; margin-top: 10px; display: block; }
input, select {
   width: 100%; padding: 8px; margin-top: 5px;
   border: 1px solid #ccc; border-radius: 5px;
}
button {
   margin-top: 15px; padding: 10px;
   background-color: #4caf50; color: white;
   border: none; border-radius: 5px; cursor: pointer;
}
button:hover { background-color: #023004; }
</style>
</head>
<body>
<div class="main">
<h2>Register</h2>
<form>
<label for="fname">First Name:</label>
<input type="text" id="fname" name="fname" required>
<label for="lname">Last Name:</label>
<input type="text" id="lname" name="lname" required>
<label for="email">Email:</label>
<input type="email" id="email" name="email" required>
<label for="password">Password:</label>
<input type="password" id="password" name="password"
pattern="^(?=.*\d)(?=.*[a-zA-Z])(?=.*[^a-zA-Z0-9]).{8,}$"
title="Must contain at least one number, one letter, one symbol, and be at least 8 characters long" required>
<label for="gender">Gender:</label>
<select id="gender" name="gender" required>
<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
<button type="submit">Submit</button>
</form>
</div>
</body>
</html>
